services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    env_file:
      - ./postgres.env
    volumes:
      - /opt/ai-chat-live2d/data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ../app/backend
      dockerfile: Dockerfile
      args:
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        ALL_PROXY: ${ALL_PROXY:-}
        NO_PROXY: ${NO_PROXY:-}
        http_proxy: ${http_proxy:-}
        https_proxy: ${https_proxy:-}
        all_proxy: ${all_proxy:-}
        no_proxy: ${no_proxy:-}
    restart: unless-stopped
    env_file:
      - ./backend.env
    depends_on:
      postgres:
        condition: service_healthy
    gpus: all
    expose:
      - "8000"
    volumes:
      - /opt/ai-chat-live2d/app/backend:/app
      - /opt/ai-chat-live2d/models:/models
      - /opt/ai-chat-live2d/vendor/CosyVoice:/vendor/CosyVoice
      - /opt/ai-chat-live2d/data/knowledge:/data/knowledge
      - /opt/ai-chat-live2d/data/uploads:/data/uploads
      - /opt/ai-chat-live2d/data/logs:/data/logs
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health')\""]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 120s

  frontend:
    build:
      context: ../app/frontend
      dockerfile: Dockerfile
      args:
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        ALL_PROXY: ${ALL_PROXY:-}
        NO_PROXY: ${NO_PROXY:-}
        http_proxy: ${http_proxy:-}
        https_proxy: ${https_proxy:-}
        all_proxy: ${all_proxy:-}
        no_proxy: ${no_proxy:-}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
