worker_processes 1;
pid /opt/ai-chat-live2d/data/logs/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  sendfile on;
  keepalive_timeout 65;
  client_body_temp_path /opt/ai-chat-live2d/deploy/nginx/tmp/client_body;
  proxy_temp_path /opt/ai-chat-live2d/deploy/nginx/tmp/proxy;
  fastcgi_temp_path /opt/ai-chat-live2d/deploy/nginx/tmp/fastcgi;
  uwsgi_temp_path /opt/ai-chat-live2d/deploy/nginx/tmp/uwsgi;
  scgi_temp_path /opt/ai-chat-live2d/deploy/nginx/tmp/scgi;

  access_log /opt/ai-chat-live2d/data/logs/nginx-access.log;
  error_log /opt/ai-chat-live2d/data/logs/nginx-error.log;

  server {
    listen 8080;
    server_name _;
    client_max_body_size 64m;

    root /opt/ai-chat-live2d/app/frontend/dist;
    index index.html;

    location /live2d/ {
      try_files $uri =404;
    }

    location / {
      try_files $uri $uri/ /index.html;
    }

    location /api/ {
      proxy_pass http://127.0.0.1:8000/api/;
      proxy_http_version 1.1;
      proxy_read_timeout 3600s;
      proxy_send_timeout 3600s;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /ws/ {
      proxy_pass http://127.0.0.1:8000/ws/;
      proxy_http_version 1.1;
      proxy_read_timeout 3600s;
      proxy_send_timeout 3600s;
      proxy_buffering off;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
